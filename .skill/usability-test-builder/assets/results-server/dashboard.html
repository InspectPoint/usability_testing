<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Usability Test Results</title>
<style>
  :root { --purple:#3D1B9D; --coral:#EA6952; --ink:#23232D; --muted:#8F8FA8; --line:#DBDBE4;
          --bg:#F7F7F9; --green:#019064; --red:#DB2B39; --amber:#866B00; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--ink); background:var(--bg); }
  header { background:#fff; border-bottom:1px solid var(--line); padding:18px 24px; }
  header h1 { font-size:20px; margin:0; }
  header .sub { color:var(--muted); font-size:13px; margin-top:2px; }
  .wrap { display:flex; min-height:calc(100vh - 60px); }
  nav { width:230px; background:#fff; border-right:1px solid var(--line); padding:16px 12px; flex:0 0 auto; }
  nav button { display:block; width:100%; text-align:left; border:0; background:transparent; padding:10px 12px;
               border-radius:8px; font-size:14px; color:var(--ink); cursor:pointer; font-family:inherit; margin-bottom:2px; }
  nav button:hover { background:var(--bg); }
  nav button.active { background:#F0E2F3; color:var(--purple); font-weight:600; }
  nav .nav-head { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin:14px 12px 6px; }
  main { flex:1 1 auto; padding:24px; max-width:1000px; }
  h2 { font-size:18px; margin:0 0 16px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px; }
  .card .label { font-size:12px; color:var(--muted); margin-bottom:6px; }
  .card .value { font-size:26px; font-weight:600; }
  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  th, td { text-align:left; padding:11px 14px; font-size:13px; border-bottom:1px solid var(--line); }
  th { background:var(--bg); color:var(--muted); font-weight:600; }
  tr:last-child td { border-bottom:0; }
  tr.clickable { cursor:pointer; } tr.clickable:hover td { background:var(--bg); }
  .bar { height:8px; background:var(--line); border-radius:6px; overflow:hidden; min-width:80px; display:inline-block; vertical-align:middle; width:120px; }
  .bar > span { display:block; height:100%; background:var(--purple); }
  .barwrap { display:flex; align-items:center; gap:8px; }
  .pill { font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; display:inline-block; }
  .pill.good { background:#D9FFF3; color:var(--green); } .pill.bad { background:#FBE5E6; color:var(--red); }
  .pill.completed { background:#D9FFF3; color:var(--green); } .pill.abandoned { background:#FBE5E6; color:var(--red); }
  .pill.in-progress { background:#FFF3C5; color:var(--amber); }
  .section-title { font-size:14px; font-weight:600; margin:26px 0 10px; }
  .resp { background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:8px; font-size:14px; line-height:1.5; }
  .resp .who { font-size:11px; color:var(--muted); margin-top:4px; }
  .empty { color:var(--muted); font-size:14px; padding:40px; text-align:center; }
  .muted { color:var(--muted); }
  tr.prow { cursor:pointer; } tr.prow:hover td { background:var(--bg); }
  .pname { font-weight:600; color:var(--purple); }
  tr.pdetail td { background:#FBFBFD; }
  .ppath { font-size:12px; line-height:1.7; padding:2px 0; }
  .ppath .ptask { display:inline-block; min-width:90px; font-weight:600; color:var(--ink); margin-right:8px; }
  .parrow { color:var(--muted); margin:0 2px; }
</style>
</head>
<body>
<header>
  <h1>Usability Test Results</h1>
  <div class="sub">Internal dashboard · Inspect Point design team</div>
</header>
<div class="wrap">
  <nav id="nav"></nav>
  <main id="main"><div class="empty">Loading results…</div></main>
</div>

<!--RESULTS_DATA-->
<script>
  function init(DATA) {
    function num(v){ var n = parseFloat(v); return isNaN(n) ? null : n; }
    function mean(a){ var v=a.filter(function(x){return x!==null;}); return v.length? v.reduce(function(p,c){return p+c;},0)/v.length : null; }
    function round(n,d){ if(n===null) return '—'; var f=Math.pow(10,d||0); return Math.round(n*f)/f; }
    function pct(n){ return n===null?'—':Math.round(n*100)+'%'; }
    function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    function fmtDT(iso){ if(!iso) return '—'; var d=new Date(iso); if(isNaN(d.getTime())) return '—'; return d.toLocaleString(undefined,{year:'numeric',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }

    var rows=(DATA.rows||[]), headers=(DATA.headers||[]);
    var taskNums=[]; headers.forEach(function(h){ var m=/^Task (\d+) completed$/.exec(h); if(m) taskNums.push(parseInt(m[1],10)); });
    taskNums.sort(function(a,b){return a-b;});
    var qCols=headers.filter(function(h){ return h.indexOf('Q: ')===0; });
    function isNum(c){ var v=rows.map(function(r){return r[c];}).filter(function(x){return x!==''&&x!=null;}); return v.length>0 && v.every(function(x){return num(x)!==null;}); }
    function who(r){ return r['Name'] || r['PID'] || r['Session'] || '—'; }
    function statusOf(r){ return r['Status'] || (r['Finished at']?'completed':'in-progress'); }

    var byTest={}; rows.forEach(function(r){ var t=(r['Test']||'Untitled').toString().trim()||'Untitled'; (byTest[t]=byTest[t]||[]).push(r); });
    var testNames=Object.keys(byTest).sort();

    function count(rs,st){ return rs.filter(function(r){return statusOf(r)===st;}).length; }
    function completion(rs){ var d=0,t=0; rs.forEach(function(r){ taskNums.forEach(function(n){ var c=r['Task '+n+' completed']; if(c==='Yes'||c==='No'){t++; if(c==='Yes')d++;} }); }); return t?d/t:null; }
    function avgQ(rs,c){ return mean(rs.map(function(r){return num(r[c]);})); }
    function lastRec(rs){ var d=rs.map(function(r){return r['Recorded at'];}).filter(Boolean).sort(); return d.length?String(d[d.length-1]).slice(0,10):'—'; }
    var easeCol=qCols.filter(function(c){return /ease/i.test(c);})[0]||null;
    // Scope survey columns to a given test's own rows so tests never show each other's questions.
    function qColsForRows(rs){ return qCols.filter(function(c){ return rs.some(function(r){ return r[c]!==''&&r[c]!=null; }); }); }
    function isNumIn(rs,c){ var v=rs.map(function(r){return r[c];}).filter(function(x){return x!==''&&x!=null;}); return v.length>0 && v.every(function(x){return num(x)!==null;}); }

    var nav=document.getElementById('nav'), main=document.getElementById('main');
    function render(view){
      nav.innerHTML='<button data-v="overview">Overview</button><div class="nav-head">Tests</div>'+
        testNames.map(function(t){return '<button data-v="t:'+encodeURIComponent(t)+'">'+esc(t)+'</button>';}).join('');
      Array.prototype.forEach.call(nav.querySelectorAll('button'),function(b){ if(b.getAttribute('data-v')===view)b.classList.add('active'); b.onclick=function(){render(b.getAttribute('data-v'));}; });
      if(view==='overview'||!view) overview(); else testView(decodeURIComponent(view.slice(2)));
    }

    function card(l,v){ return '<div class="card"><div class="label">'+esc(l)+'</div><div class="value">'+v+'</div></div>'; }
    function barCell(f){ if(f===null) return '—'; var p=Math.round(f*100); var cls=p>=70?'good':(p<40?'bad':''); return '<div class="barwrap"><span class="bar"><span style="width:'+p+'%"></span></span><span class="pill '+cls+'">'+p+'%</span></div>'; }
    function statusPill(st){ return '<span class="pill '+st+'">'+st+'</span>'; }

    function overview(){
      if(!rows.length){ main.innerHTML='<div class="empty">No results yet. Once participants start, they\'ll appear here.</div>'; return; }
      var html='<h2>Overview — all tests</h2><div class="cards">'+
        card('Tests',testNames.length)+card('Participants',rows.length)+
        card('Completed',count(rows,'completed'))+card('Abandoned',count(rows,'abandoned'))+
        '</div>';  // per-test averages live in each test's own view (no cross-test mixing)
      html+='<table><tr><th>Test</th><th>Participants</th><th>Completed</th><th>Abandoned</th><th>Task completion</th><th>Last result</th></tr>';
      testNames.forEach(function(t){ var rs=byTest[t];
        html+='<tr class="clickable" data-go="'+encodeURIComponent(t)+'"><td>'+esc(t)+'</td><td>'+rs.length+'</td><td>'+count(rs,'completed')+'</td><td>'+count(rs,'abandoned')+'</td><td>'+barCell(completion(rs))+'</td><td class="muted">'+lastRec(rs)+'</td></tr>';
      });
      html+='</table>';
      main.innerHTML=html;
      Array.prototype.forEach.call(main.querySelectorAll('tr[data-go]'),function(tr){ tr.onclick=function(){render('t:'+tr.getAttribute('data-go'));}; });
    }

    function testView(name){
      var rs=byTest[name]||[]; var html='<h2>'+esc(name)+'</h2>';
      if(!rs.length){ main.innerHTML=html+'<div class="empty">No sessions yet.</div>'; return; }
      var done=rs.filter(function(r){return statusOf(r)==='completed';});
      var localQ=qColsForRows(rs);  // only this test's survey questions
      var numQ=localQ.filter(function(c){return isNumIn(rs,c);});  // numeric (rating) questions
      html+='<div class="cards">'+card('Participants',rs.length)+card('Completed',done.length)+card('Abandoned',count(rs,'abandoned'))+card('Task completion',pct(completion(rs)));
      numQ.forEach(function(c){ html+=card('Avg '+c.slice(3),(avgQ(done,c)===null?'—':round(avgQ(done,c),1)+' / 5')); });
      html+='</div>';

      // who did what
      var pcols=5+numQ.length;
      html+='<div class="section-title">Participants <span class="muted" style="font-weight:400">— click a name to see the path they took</span></div><table><tr><th>Participant</th><th>PID</th><th>Status</th><th>Last task reached</th>'+numQ.map(function(c){return '<th>'+esc(c.slice(3))+'</th>';}).join('')+'<th>Completed</th></tr>';
      rs.forEach(function(r,ri){
        html+='<tr class="prow" data-ri="'+ri+'"><td><span class="pname">&#9656; '+esc(r['Name']||'—')+'</span></td><td class="muted">'+esc(r['PID']||'—')+'</td><td>'+statusPill(statusOf(r))+'</td><td>'+esc(r['Last task reached']||'—')+'</td>'+numQ.map(function(c){return '<td>'+(r[c]===''||r[c]==null?'—':esc(r[c]))+'</td>';}).join('')+'<td class="muted">'+fmtDT(r['Finished at'])+'</td></tr>';
        var paths=taskNums.map(function(n){ var p=(r['Task '+n+' click path']||'').toString().trim(); if(!p) return ''; var nm=r['Task '+n+' name']||('Task '+n); var steps=p.split(' > ').map(function(s){return esc(s);}).join(' <span class="parrow">&#8594;</span> '); return '<div class="ppath"><span class="ptask">'+esc(nm)+'</span>'+steps+'</div>'; }).filter(Boolean).join('');
        html+='<tr class="pdetail" data-ri="'+ri+'" style="display:none"><td colspan="'+pcols+'">'+(paths||'<span class="muted">No click path recorded.</span>')+'</td></tr>';
      });
      html+='</table>';

      // by task
      html+='<div class="section-title">By task</div><table><tr><th>Task</th><th>Completion</th><th>Avg time</th><th>Avg clicks</th></tr>';
      taskNums.forEach(function(n){ var d=0,t=0,times=[],clicks=[],label=null;
        rs.forEach(function(r){ var c=r['Task '+n+' completed']; if(c==='Yes'||c==='No'){t++; if(c==='Yes')d++;} var s=num(r['Task '+n+' seconds']); if(s!==null)times.push(s); var ck=num(r['Task '+n+' clicks']); if(ck!==null)clicks.push(ck); if(!label&&r['Task '+n+' name'])label=r['Task '+n+' name']; });
        html+='<tr><td>'+esc(label||('Task '+n))+'</td><td>'+barCell(t?d/t:null)+'</td><td>'+(mean(times)===null?'—':round(mean(times),0)+'s')+'</td><td>'+(mean(clicks)===null?'—':round(mean(clicks),1))+'</td></tr>';
      });
      html+='</table>';

      // open text (completed + abandoned, whoever answered)
      localQ.filter(function(c){return !isNumIn(rs,c);}).forEach(function(c){
        var ans=rs.map(function(r){return {a:(r[c]||'').toString().trim(),who:who(r)};}).filter(function(x){return x.a;});
        html+='<div class="section-title">'+esc(c.slice(3))+'</div>';
        html+= ans.length? ans.map(function(x){return '<div class="resp">'+esc(x.a)+'<div class="who">'+esc(x.who)+'</div></div>';}).join('') : '<div class="muted">No responses.</div>';
      });
      main.innerHTML=html;
      Array.prototype.forEach.call(main.querySelectorAll('tr.prow'),function(tr){ tr.onclick=function(){
        var d=main.querySelector('tr.pdetail[data-ri="'+tr.getAttribute('data-ri')+'"]'); if(!d) return;
        var open=d.style.display!=='none'; d.style.display=open?'none':'table-row';
        var nm=tr.querySelector('.pname'); if(nm) nm.innerHTML=(open?'&#9656; ':'&#9662; ')+nm.textContent.replace(/^[▸▾]\s*/,'');
      }; });
    }

    render('overview');
  }

  init(window.__RESULTS__ || { headers: [], rows: [] });
</script>
</body>
</html>
